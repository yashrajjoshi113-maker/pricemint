<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | PriceMint</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A1A1A'/><text x='50' y='68' font-size='60' font-weight='bold' text-anchor='middle' fill='white' font-family='system-ui'>P</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style type="text/tailwindcss">
        @theme { --color-charcoal: #111827; --color-savings: #10B981; --font-sans: 'Inter', sans-serif; --font-display: 'Outfit', sans-serif; }
    </style>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .font-display { font-family: 'Outfit', sans-serif; }
        .price-row:hover { background-color: #F1F5F9; }
        .shadow-soft { box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #111827; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-900 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center gap-2.5 group shrink-0">
                    <div class="w-9 h-9 bg-charcoal rounded-xl flex items-center justify-center group-hover:scale-105 transition-transform">
                        <span class="text-white font-display font-bold text-base">P</span>
                    </div>
                    <span class="font-display font-bold text-xl tracking-tight text-gray-900">Price<span class="text-green-500">Mint</span></span>
                </a>
                
                <!-- Desktop Search -->
                <div class="hidden md:flex flex-1 max-w-xl mx-8 relative">
                    <input type="text" id="header-search" placeholder="Search for products..." class="w-full pl-11 pr-4 py-2.5 bg-gray-100 rounded-xl border-transparent focus:bg-white focus:border-gray-900 focus:ring-1 focus:ring-gray-900 outline-none transition-all text-sm">
                    <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>

                <nav class="flex items-center gap-6">
                    <a href="search.html" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors hidden sm:block">Explore</a>
                    <a href="deals.html" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors hidden sm:block">Deals</a>
                    <div class="auth-link">
                        <a href="login.html" class="text-sm font-semibold bg-gray-900 text-white px-4 py-2 rounded-xl hover:bg-gray-800 transition-colors">Sign In</a>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <!-- Loader -->
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-gray-500 font-medium">Fetching best prices across India...</p>
        </div>

        <div id="product-container" class="hidden">
            <nav class="flex text-sm text-gray-500 mb-6" aria-label="Breadcrumb">
                <a href="index.html" class="hover:text-gray-900">Home</a><span class="mx-2">/</span>
                <span class="text-gray-900 font-medium truncate max-w-xs" id="bc-title">Product</span>
            </nav>

            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Left: Product Image & Specs -->
                <div class="lg:w-5/12">
                    <div class="bg-white rounded-[2rem] p-8 shadow-soft flex items-center justify-center border border-gray-100 mb-6 sticky top-24 relative">
                        <button id="alert-btn" class="absolute top-4 right-4 bg-white border border-gray-200 shadow-sm p-2.5 rounded-xl hover:bg-gray-50 hover:text-red-500 transition-colors group flex items-center gap-2" title="Set Price Alert">
                            <svg class="w-5 h-5 text-gray-500 group-hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                            <span class="text-xs font-bold text-gray-700 group-hover:text-red-500">Alert</span>
                        </button>
                        <img id="p-image" src="" alt="Product Image" class="w-full h-auto max-h-96 object-contain">
                    </div>
                </div>

                <!-- Right: Product Info & Comparison -->
                <div class="lg:w-7/12">
                    <div class="mb-6">
                        <div class="flex items-center gap-3 mb-2">
                            <span id="p-brand" class="text-sm font-bold text-blue-600 uppercase tracking-wider bg-blue-50 px-2.5 py-0.5 rounded-full">Brand</span>
                        </div>
                        <h1 id="p-title" class="text-3xl sm:text-4xl font-display font-bold text-gray-900 leading-tight mb-4">Title</h1>
                        
                        <div class="flex items-end gap-3 mb-4">
                            <span id="p-lowest-price" class="text-4xl font-display font-bold text-gray-900">₹0</span>
                            <span id="p-original-price" class="text-lg text-gray-400 line-through mb-1">₹0</span>
                        </div>
                        <p class="text-sm text-gray-500 font-medium">Lowest price available on <strong id="p-cheapest-plat" class="text-gray-900">Platform</strong></p>
                    </div>

                    <div class="bg-white rounded-2xl shadow-soft border border-gray-100 overflow-hidden mb-8">
                        <div class="bg-gray-50 px-6 py-4 border-b border-gray-100">
                            <h2 class="font-display font-bold text-lg text-gray-900">Compare Prices</h2>
                        </div>
                        <div class="divide-y divide-gray-100" id="prices-list"></div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-soft border border-gray-100 p-6 mb-8">
                        <h2 class="font-display font-bold text-lg text-gray-900 mb-4">Key Specifications</h2>
                        <ul id="p-specs" class="grid grid-cols-1 sm:grid-cols-2 gap-y-3 gap-x-6"></ul>
                    </div>

                    <div class="bg-white rounded-2xl shadow-soft border border-gray-100 p-6 mb-8">
                        <h2 class="font-display font-bold text-lg text-gray-900 mb-4">Price History (30 Days)</h2>
                        <div class="w-full h-64 relative"><canvas id="priceChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Auth & Logic -->
    <script type="module">
        import { checkSession, updateAuthUI } from './js/auth.js';
        const formatPrice = (price) => '₹' + price.toLocaleString('en-IN');
        
        document.addEventListener('DOMContentLoaded', async () => {
            await updateAuthUI();
            
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            if (!productId) {
                document.getElementById('loading').innerHTML = '<p class="text-red-500 font-bold">No product ID provided.</p>';
                return;
            }

            let productData = null;

            try {
                const res = await fetch(`http://localhost:3000/api/products/${productId}`);
                if (!res.ok) throw new Error('Product not found');
                productData = await res.json();

                // Populate Data
                document.getElementById('bc-title').textContent = productData.title;
                document.getElementById('p-image').src = productData.image;
                document.getElementById('p-brand').textContent = productData.brand;
                document.getElementById('p-title').textContent = productData.title;
                document.getElementById('p-lowest-price').textContent = formatPrice(productData.lowestPrice);
                document.getElementById('p-original-price').textContent = formatPrice(productData.originalPrice);
                document.getElementById('p-cheapest-plat').textContent = productData.cheapestPlatform;

                // Specs
                if (productData.specs) {
                    document.getElementById('p-specs').innerHTML = Object.entries(productData.specs).map(([key, val]) => `
                        <li class="flex items-start text-sm"><span class="font-medium text-gray-500 w-1/3">${key}:</span><span class="text-gray-900 font-semibold w-2/3">${val}</span></li>
                    `).join('');
                }

                // Prices
                if (productData.prices && productData.prices.length > 0) {
                    productData.prices.sort((a,b) => a.price - b.price);
                    document.getElementById('prices-list').innerHTML = productData.prices.map((p, i) => `
                        <div class="flex items-center justify-between px-6 py-4 price-row">
                            <div class="flex items-center gap-4">
                                <img src="${p.logo}" class="w-16 h-8 object-contain bg-white rounded border border-gray-100">
                                <div><span class="block font-bold text-gray-900">${formatPrice(p.price)}</span></div>
                            </div>
                            <a href="${p.url}" class="px-5 py-2 rounded-xl text-sm font-semibold ${i === 0 ? 'bg-gray-900 text-white' : 'bg-gray-100'}">Buy</a>
                        </div>
                    `).join('');
                }

                // Chart
                if (productData.history) {
                    const ctx = document.getElementById('priceChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: productData.history.map(h => h.date.substring(5)),
                            datasets: [{ label: 'Price', data: productData.history.map(h => h.price), borderColor: '#111827', backgroundColor: 'rgba(17, 24, 39, 0.05)', fill: true, tension: 0.3 }]
                        }
                    });
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('product-container').classList.remove('hidden');
            } catch (err) {
                document.getElementById('loading').innerHTML = '<p class="text-red-500 font-bold">Failed to load product.</p>';
            }

            // Price Alert Logic
            const alertBtn = document.getElementById('alert-btn');
            alertBtn.addEventListener('click', async () => {
                const session = await checkSession();
                if(!session) {
                    alert("Please sign in to set a price alert.");
                    window.location.href = 'login.html';
                    return;
                }
                
                const targetStr = prompt(`Set target price for ${productData.title} (Current: ${formatPrice(productData.lowestPrice)}):\nEnter amount in numbers:`);
                if(!targetStr) return;
                const target_price = parseInt(targetStr);
                if(isNaN(target_price) || target_price >= productData.lowestPrice) {
                    alert("Please enter a valid price lower than the current price.");
                    return;
                }

                alertBtn.innerHTML = '<div class="loader w-4 h-4 border-2"></div>';
                try {
                    const r = await fetch('http://localhost:3000/api/wishlist', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: session.user.id, product_id: productData.id, target_price })
                    });
                    if(r.ok) {
                        alert("Price alert set successfully! You can view it in your Wishlist.");
                        alertBtn.innerHTML = '<span class="text-xs font-bold text-green-600">Tracked ✓</span>';
                    }
                } catch(e) {
                    alert("Failed to set alert.");
                    alertBtn.innerHTML = '<span class="text-xs font-bold">Alert</span>';
                }
            });
        });
    </script>
</body>
</html>
