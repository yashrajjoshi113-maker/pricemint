<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | PriceMint</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A1A1A'/><text x='50' y='68' font-size='60' font-weight='bold' text-anchor='middle' fill='white' font-family='system-ui'>P</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-charcoal: #111827;
            --color-savings: #10B981;
            --font-sans: 'Inter', system-ui, sans-serif;
            --font-display: 'Outfit', system-ui, sans-serif;
        }
    </style>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .font-display { font-family: 'Outfit', sans-serif; }
        
        .price-row:hover { background-color: #F1F5F9; }
        .shadow-soft { box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #111827;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-900 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center gap-2.5 group shrink-0">
                    <div class="w-9 h-9 bg-charcoal rounded-xl flex items-center justify-center group-hover:scale-105 transition-transform">
                        <span class="text-white font-display font-bold text-base">P</span>
                    </div>
                    <span class="font-display font-bold text-xl tracking-tight text-gray-900">Price<span class="text-green-500">Mint</span></span>
                </a>
                
                <!-- Desktop Search -->
                <div class="hidden md:flex flex-1 max-w-xl mx-8 relative">
                    <input type="text" id="header-search" placeholder="Search for products..." class="w-full pl-11 pr-4 py-2.5 bg-gray-100 rounded-xl border-transparent focus:bg-white focus:border-gray-900 focus:ring-1 focus:ring-gray-900 outline-none transition-all text-sm">
                    <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <div id="search-autocomplete" class="hidden absolute top-full left-0 right-0 mt-1 bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden z-50"></div>
                </div>

                <nav class="flex items-center gap-6">
                    <a href="search.html" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors hidden sm:block">Explore</a>
                    <a href="deals.html" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors hidden sm:block">Deals</a>
                    <a href="login.html" class="text-sm font-semibold bg-gray-900 text-white px-4 py-2 rounded-xl hover:bg-gray-800 transition-colors">Sign In</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <!-- Loader -->
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-gray-500 font-medium">Fetching best prices across India...</p>
        </div>

        <div id="product-container" class="hidden">
            <!-- Breadcrumbs -->
            <nav class="flex text-sm text-gray-500 mb-6" aria-label="Breadcrumb">
                <a href="index.html" class="hover:text-gray-900">Home</a>
                <span class="mx-2">/</span>
                <a href="search.html" id="bc-category" class="hover:text-gray-900 capitalize">Category</a>
                <span class="mx-2">/</span>
                <span class="text-gray-900 font-medium truncate max-w-xs" id="bc-title">Product</span>
            </nav>

            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Left: Product Image & Specs -->
                <div class="lg:w-5/12">
                    <div class="bg-white rounded-[2rem] p-8 shadow-soft flex items-center justify-center border border-gray-100 mb-6 sticky top-24">
                        <img id="p-image" src="" alt="Product Image" class="w-full h-auto max-h-96 object-contain">
                    </div>
                </div>

                <!-- Right: Product Info & Comparison -->
                <div class="lg:w-7/12">
                    <div class="mb-6">
                        <div class="flex items-center gap-3 mb-2">
                            <span id="p-brand" class="text-sm font-bold text-blue-600 uppercase tracking-wider bg-blue-50 px-2.5 py-0.5 rounded-full">Brand</span>
                            <div class="flex items-center gap-1 bg-yellow-50 px-2 py-0.5 rounded-full border border-yellow-100">
                                <span class="text-xs font-bold text-yellow-600">★ <span id="p-rating">4.5</span></span>
                            </div>
                        </div>
                        <h1 id="p-title" class="text-3xl sm:text-4xl font-display font-bold text-gray-900 leading-tight mb-4">Product Title</h1>
                        
                        <div class="flex items-end gap-3 mb-4">
                            <span id="p-lowest-price" class="text-4xl font-display font-bold text-gray-900">₹0</span>
                            <span id="p-original-price" class="text-lg text-gray-400 line-through mb-1">₹0</span>
                            <span id="p-discount" class="ml-2 bg-green-100 text-green-700 px-2.5 py-1 rounded-lg text-sm font-bold mb-1 border border-green-200">-0%</span>
                        </div>
                        <p class="text-sm text-gray-500 font-medium">Lowest price available on <strong id="p-cheapest-plat" class="text-gray-900">Platform</strong></p>
                    </div>

                    <!-- Compare Prices Table -->
                    <div class="bg-white rounded-2xl shadow-soft border border-gray-100 overflow-hidden mb-8">
                        <div class="bg-gray-50 px-6 py-4 border-b border-gray-100">
                            <h2 class="font-display font-bold text-lg text-gray-900">Compare Prices</h2>
                        </div>
                        <div class="divide-y divide-gray-100" id="prices-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Specs -->
                    <div class="bg-white rounded-2xl shadow-soft border border-gray-100 p-6 mb-8">
                        <h2 class="font-display font-bold text-lg text-gray-900 mb-4">Key Specifications</h2>
                        <ul id="p-specs" class="grid grid-cols-1 sm:grid-cols-2 gap-y-3 gap-x-6">
                            <!-- Populated by JS -->
                        </ul>
                    </div>

                    <!-- Price History Chart -->
                    <div class="bg-white rounded-2xl shadow-soft border border-gray-100 p-6 mb-8">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="font-display font-bold text-lg text-gray-900">Price History (30 Days)</h2>
                            <span class="text-xs font-medium bg-gray-100 px-2 py-1 rounded text-gray-500">Track Drops</span>
                        </div>
                        <div class="w-full h-64 relative">
                            <canvas id="priceChart"></canvas>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script>
        const formatPrice = (price) => '₹' + price.toLocaleString('en-IN');
        
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                document.getElementById('loading').innerHTML = '<p class="text-red-500 font-bold">No product ID provided.</p>';
                return;
            }

            try {
                const res = await fetch(`http://localhost:3000/api/products/${productId}`);
                if (!res.ok) throw new Error('Product not found');
                const product = await res.json();

                // Populate Data
                document.title = `${product.title} Price in India | PriceMint`;
                document.getElementById('bc-category').textContent = product.category || 'General';
                document.getElementById('bc-title').textContent = product.title;
                
                document.getElementById('p-image').src = product.image || `https://via.placeholder.com/400x400.png?text=${encodeURIComponent(product.title)}`;
                document.getElementById('p-brand').textContent = product.brand;
                document.getElementById('p-rating').textContent = product.rating || '4.5';
                document.getElementById('p-title').textContent = product.title;
                
                document.getElementById('p-lowest-price').textContent = formatPrice(product.lowestPrice);
                if (product.originalPrice > product.lowestPrice) {
                    document.getElementById('p-original-price').textContent = formatPrice(product.originalPrice);
                    document.getElementById('p-discount').textContent = `-${product.discount}%`;
                } else {
                    document.getElementById('p-original-price').style.display = 'none';
                    document.getElementById('p-discount').style.display = 'none';
                }
                document.getElementById('p-cheapest-plat').textContent = product.cheapestPlatform;

                // Specs
                const specsContainer = document.getElementById('p-specs');
                if (product.specs) {
                    specsContainer.innerHTML = Object.entries(product.specs).map(([key, val]) => `
                        <li class="flex items-start text-sm">
                            <span class="font-medium text-gray-500 w-1/3">${key}:</span>
                            <span class="text-gray-900 font-semibold w-2/3">${val}</span>
                        </li>
                    `).join('');
                }

                // Prices Table
                const pricesContainer = document.getElementById('prices-list');
                if (product.prices && product.prices.length > 0) {
                    // Sort lowest first
                    product.prices.sort((a,b) => a.price - b.price);
                    
                    pricesContainer.innerHTML = product.prices.map((p, index) => `
                        <div class="flex items-center justify-between px-6 py-4 price-row transition-colors">
                            <div class="flex items-center gap-4">
                                <img src="${p.logo}" alt="${p.platform}" class="w-16 h-8 object-contain bg-white rounded px-1 border border-gray-100">
                                <div>
                                    <span class="block font-bold text-gray-900">${formatPrice(p.price)}</span>
                                    <span class="text-xs text-gray-500 flex items-center gap-1">
                                        <svg class="w-3 h-3 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                                        In Stock
                                    </span>
                                </div>
                            </div>
                            <a href="${p.url}" target="_blank" class="px-5 py-2 rounded-xl text-sm font-semibold transition-colors ${index === 0 ? 'bg-gray-900 text-white hover:bg-gray-800 shadow-md' : 'bg-gray-100 text-gray-900 hover:bg-gray-200'}">
                                ${index === 0 ? 'Buy Lowest' : 'Go to Store'}
                            </a>
                        </div>
                    `).join('');
                }

                // Chart.js Price History
                if (product.history && product.history.length > 0) {
                    const ctx = document.getElementById('priceChart').getContext('2d');
                    const labels = product.history.map(h => h.date.substring(5)); // MM-DD
                    const data = product.history.map(h => h.price);

                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Price (₹)',
                                data: data,
                                borderColor: '#111827',
                                backgroundColor: 'rgba(17, 24, 39, 0.05)',
                                borderWidth: 2,
                                pointBackgroundColor: '#10B981',
                                pointBorderColor: '#fff',
                                pointRadius: 3,
                                pointHoverRadius: 5,
                                fill: true,
                                tension: 0.3
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: '#111827',
                                    titleFont: { family: 'Inter', size: 13 },
                                    bodyFont: { family: 'Inter', size: 14, weight: 'bold' },
                                    callbacks: {
                                        label: function(context) { return formatPrice(context.raw); }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    ticks: { font: { family: 'Inter' }, callback: function(value) { return '₹' + (value/1000) + 'k'; } },
                                    grid: { color: '#F1F5F9' }
                                },
                                x: {
                                    ticks: { font: { family: 'Inter', size: 10 }, maxTicksLimit: 10 },
                                    grid: { display: false }
                                }
                            }
                        }
                    });
                } else {
                    document.getElementById('priceChart').parentElement.innerHTML = '<p class="text-sm text-gray-500 text-center py-10">No price history available.</p>';
                }

                // Show Content
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('product-container').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = '<p class="text-red-500 font-bold">Failed to load product details.</p>';
            }
        });
        
        // Basic Search routing
        const searchInput = document.getElementById('header-search');
        if(searchInput) {
            searchInput.addEventListener('keypress', (e) => {
                if(e.key === 'Enter' && e.target.value.trim()) {
                    window.location.href = `search.html?q=${encodeURIComponent(e.target.value.trim())}`;
                }
            });
        }
    </script>
</body>
</html>
