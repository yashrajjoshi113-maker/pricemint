<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | PriceMint</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A1A1A'/><text x='50' y='68' font-size='60' font-weight='bold' text-anchor='middle' fill='white' font-family='system-ui'>P</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme { --color-charcoal: #111827; --color-savings: #10B981; --font-sans: 'Inter', sans-serif; --font-display: 'Outfit', sans-serif; }
    </style>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Outfit', sans-serif; }
        .input-field { width: 100%; padding: 0.65rem 0.9rem; background: white; border: 1px solid #E5E7EB; border-radius: 10px; outline: none; transition: all 0.2s ease; font-size: 0.875rem; }
        .input-field:focus { border-color: #111827; box-shadow: 0 0 0 3px rgba(17,24,39,0.08); }
        .loader { border: 2px solid rgba(0,0,0,0.1); border-top: 2px solid #111827; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <!-- Gatekeeper screens -->
    <div id="checking-screen" class="min-h-screen flex flex-col items-center justify-center gap-3">
        <div class="loader"></div>
        <p class="text-sm text-gray-500">Checking access...</p>
    </div>

    <div id="denied-screen" class="hidden min-h-screen flex flex-col items-center justify-center gap-3 text-center px-4">
        <h1 class="text-2xl font-display font-bold text-gray-900">Access Denied</h1>
        <p class="text-sm text-gray-500 max-w-sm">You're signed in, but this account isn't authorized to manage products. Ask the site owner to add your user ID to the <code class="bg-gray-100 px-1.5 py-0.5 rounded">admins</code> table.</p>
        <a href="index.html" class="mt-2 text-sm font-semibold text-charcoal hover:underline">← Back to Home</a>
    </div>

    <!-- Admin dashboard (hidden until access confirmed) -->
    <div id="admin-app" class="hidden">
        <header class="sticky top-0 z-40 bg-white border-b border-gray-200">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center gap-2.5">
                    <div class="w-8 h-8 bg-charcoal rounded-lg flex items-center justify-center">
                        <span class="text-white font-display font-bold text-sm">P</span>
                    </div>
                    <span class="font-display font-bold text-lg text-gray-900">Admin Panel</span>
                </div>
                <button id="logout-btn" class="text-sm font-medium text-gray-500 hover:text-red-600 transition-colors">Sign Out</button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 lg:grid-cols-5 gap-8">

            <!-- Form -->
            <section class="lg:col-span-2">
                <div class="bg-white rounded-2xl border border-gray-200 p-6 sticky top-24">
                    <h2 class="font-display font-bold text-lg mb-4" id="form-heading">Add Product</h2>
                    <div id="form-error" class="hidden mb-3 p-2.5 bg-red-50 text-red-600 text-xs rounded-lg border border-red-100" role="alert"></div>
                    <div id="form-success" class="hidden mb-3 p-2.5 bg-green-50 text-green-600 text-xs rounded-lg border border-green-100" role="status"></div>

                    <form id="product-form" class="space-y-3">
                        <input type="hidden" id="product-id">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Title *</label>
                            <input type="text" id="title" class="input-field" required>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Brand</label>
                                <input type="text" id="brand" class="input-field">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Category</label>
                                <input type="text" id="category" class="input-field" placeholder="smartphones">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Thumbnail Image URL</label>
                            <input type="url" id="thumbnail" class="input-field" placeholder="https://...">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Original Price (₹) *</label>
                                <input type="number" id="original_price" class="input-field" required min="0" step="1">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Lowest Price (₹) *</label>
                                <input type="number" id="lowest_price" class="input-field" required min="0" step="1">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Cheapest Platform</label>
                                <input type="text" id="cheapest_platform" class="input-field" placeholder="Amazon">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Buy Link (URL)</label>
                                <input type="url" id="cheapest_url" class="input-field" placeholder="https://...">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Rating (0-5)</label>
                                <input type="number" id="rating" class="input-field" min="0" max="5" step="0.1" value="0">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600 mb-1">Review Count</label>
                                <input type="number" id="review_count" class="input-field" min="0" step="1" value="0">
                            </div>
                        </div>
                        <label class="flex items-center gap-2 text-sm text-gray-700 pt-1">
                            <input type="checkbox" id="is_active" checked class="rounded">
                            Active (visible on site)
                        </label>

                        <div class="flex gap-2 pt-2">
                            <button type="submit" id="submit-btn" class="flex-1 bg-charcoal text-white font-semibold py-2.5 rounded-xl hover:bg-gray-800 transition-colors flex items-center justify-center gap-2">
                                <span id="submit-text">Add Product</span>
                            </button>
                            <button type="button" id="cancel-edit-btn" class="hidden px-4 py-2.5 rounded-xl border border-gray-200 text-sm font-medium text-gray-600 hover:bg-gray-50">Cancel</button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Product list -->
            <section class="lg:col-span-3">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-display font-bold text-lg">All Products</h2>
                    <button id="refresh-btn" class="text-xs font-medium text-gray-500 hover:text-charcoal">↻ Refresh</button>
                </div>
                <div id="list-loading" class="text-center py-10 text-sm text-gray-400">Loading products...</div>
                <div id="list-empty" class="hidden text-center py-10 text-sm text-gray-400">No products yet. Add your first one!</div>
                <div id="product-list" class="space-y-3"></div>
            </section>

        </main>
    </div>

    <script type="module">
        import { checkSession, signOut } from './js/auth.js';
        import { isAdmin, getAllProductsAdmin, createProduct, updateProduct, deleteProduct } from './js/admin.js';

        const checkingScreen = document.getElementById('checking-screen');
        const deniedScreen = document.getElementById('denied-screen');
        const adminApp = document.getElementById('admin-app');

        const form = document.getElementById('product-form');
        const formHeading = document.getElementById('form-heading');
        const formError = document.getElementById('form-error');
        const formSuccess = document.getElementById('form-success');
        const submitBtn = document.getElementById('submit-btn');
        const submitText = document.getElementById('submit-text');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const productList = document.getElementById('product-list');
        const listLoading = document.getElementById('list-loading');
        const listEmpty = document.getElementById('list-empty');

        const fields = ['title', 'brand', 'category', 'thumbnail', 'original_price', 'lowest_price', 'cheapest_platform', 'cheapest_url', 'rating', 'review_count'];

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str ?? '';
            return div.innerHTML;
        }

        function resetForm() {
            form.reset();
            document.getElementById('product-id').value = '';
            document.getElementById('is_active').checked = true;
            formHeading.textContent = 'Add Product';
            submitText.textContent = 'Add Product';
            cancelEditBtn.classList.add('hidden');
            formError.classList.add('hidden');
        }

        function populateForm(p) {
            document.getElementById('product-id').value = p.id;
            fields.forEach((f) => { document.getElementById(f).value = p[f] ?? ''; });
            document.getElementById('is_active').checked = !!p.is_active;
            formHeading.textContent = 'Edit Product';
            submitText.textContent = 'Save Changes';
            cancelEditBtn.classList.remove('hidden');
            formError.classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderProductRow(p) {
            const thumb = p.thumbnail || `https://via.placeholder.com/80?text=${encodeURIComponent(p.title[0] || 'P')}`;
            return `
            <div class="bg-white rounded-xl border border-gray-200 p-4 flex items-center gap-4">
                <img src="${thumb}" alt="" class="w-14 h-14 rounded-lg object-cover bg-gray-100 shrink-0">
                <div class="flex-1 min-w-0">
                    <p class="font-semibold text-sm text-gray-900 truncate">${escapeHtml(p.title)}</p>
                    <p class="text-xs text-gray-500">₹${Number(p.lowest_price).toLocaleString('en-IN')} · ${p.discount}% off · ${p.is_active ? '<span class="text-green-600">Active</span>' : '<span class="text-gray-400">Hidden</span>'}</p>
                </div>
                <div class="flex gap-2 shrink-0">
                    <button data-edit="${p.id}" class="text-xs font-semibold px-3 py-1.5 rounded-lg bg-gray-100 hover:bg-gray-200 transition-colors">Edit</button>
                    <button data-delete="${p.id}" class="text-xs font-semibold px-3 py-1.5 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 transition-colors">Delete</button>
                </div>
            </div>`;
        }

        let allProducts = [];

        async function loadProducts() {
            listLoading.classList.remove('hidden');
            listEmpty.classList.add('hidden');
            productList.innerHTML = '';

            const { data, error } = await getAllProductsAdmin();
            listLoading.classList.add('hidden');

            if (error) {
                productList.innerHTML = `<p class="text-sm text-red-500">Failed to load products.</p>`;
                return;
            }

            allProducts = data;
            if (!data.length) {
                listEmpty.classList.remove('hidden');
                return;
            }
            productList.innerHTML = data.map(renderProductRow).join('');
        }

        productList.addEventListener('click', async (e) => {
            const editId = e.target.closest('[data-edit]')?.dataset.edit;
            const deleteId = e.target.closest('[data-delete]')?.dataset.delete;

            if (editId) {
                const product = allProducts.find((p) => p.id === editId);
                if (product) populateForm(product);
            }

            if (deleteId) {
                const product = allProducts.find((p) => p.id === deleteId);
                if (!confirm(`Delete "${product?.title || 'this product'}"? This cannot be undone.`)) return;
                const { error } = await deleteProduct(deleteId);
                if (error) {
                    alert('Failed to delete: ' + error.message);
                } else {
                    loadProducts();
                }
            }
        });

        cancelEditBtn.addEventListener('click', resetForm);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            formError.classList.add('hidden');
            formSuccess.classList.add('hidden');

            const id = document.getElementById('product-id').value;
            const payload = {
                title: document.getElementById('title').value.trim(),
                brand: document.getElementById('brand').value.trim() || null,
                category: document.getElementById('category').value.trim() || null,
                thumbnail: document.getElementById('thumbnail').value.trim() || null,
                original_price: Number(document.getElementById('original_price').value),
                lowest_price: Number(document.getElementById('lowest_price').value),
                cheapest_platform: document.getElementById('cheapest_platform').value.trim() || null,
                cheapest_url: document.getElementById('cheapest_url').value.trim() || null,
                rating: Number(document.getElementById('rating').value) || 0,
                review_count: Number(document.getElementById('review_count').value) || 0,
                is_active: document.getElementById('is_active').checked,
            };

            if (!payload.title || payload.original_price < 0 || payload.lowest_price < 0) {
                formError.textContent = 'Please fill required fields with valid values.';
                formError.classList.remove('hidden');
                return;
            }
            if (payload.lowest_price > payload.original_price) {
                formError.textContent = 'Lowest price cannot be higher than original price.';
                formError.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitText.innerHTML = '<div class="loader"></div>';

            const { error } = id
                ? await updateProduct(id, payload)
                : await createProduct(payload);

            submitBtn.disabled = false;

            if (error) {
                formError.textContent = error.message || 'Something went wrong.';
                formError.classList.remove('hidden');
                submitText.textContent = id ? 'Save Changes' : 'Add Product';
                return;
            }

            formSuccess.textContent = id ? 'Product updated!' : 'Product added!';
            formSuccess.classList.remove('hidden');
            resetForm();
            loadProducts();
        });

        document.getElementById('refresh-btn').addEventListener('click', loadProducts);
        document.getElementById('logout-btn').addEventListener('click', () => signOut());

        // ---- Gatekeeper: must be logged in AND in the admins table ----
        (async () => {
            const session = await checkSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            const admin = await isAdmin();
            checkingScreen.classList.add('hidden');

            if (!admin) {
                deniedScreen.classList.remove('hidden');
                return;
            }

            adminApp.classList.remove('hidden');
            loadProducts();
        })();
    </script>
</body>
</html>
