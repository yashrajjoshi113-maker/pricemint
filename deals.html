<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Deals | PriceMint</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme { --color-msp-orange: #ff7e00; --color-msp-blue: #0f4094; }
    </style>
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; background-color: #f1f3f6; color: #212121; }
        .nav-link { color: #212121; font-weight: 500; font-size: 14px; text-decoration: none; padding: 12px 16px; display: inline-block; }
        .nav-link:hover { color: #ff7e00; border-bottom: 2px solid #ff7e00; }
        .btn-orange { background-color: #ff7e00; color: white; padding: 8px 24px; border-radius: 2px; font-weight: 600; text-transform: uppercase; font-size: 14px; transition: background 0.2s; }
        .btn-orange:hover { background-color: #e67100; }
        .search-input { border: 1px solid #e0e0e0; border-right: none; border-radius: 4px 0 0 4px; padding: 10px 16px; font-size: 14px; outline: none; }
        .search-input:focus { border-color: #ff7e00; }
        .search-btn { background-color: #ff7e00; color: white; border-radius: 0 4px 4px 0; padding: 0 20px; font-weight: bold; }
        .deal-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 2px; }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="bg-white border-b border-gray-200">
        <div class="max-w-[1280px] mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-1 shrink-0">
                <div class="w-8 h-8 bg-msp-blue flex items-center justify-center rounded text-white font-bold text-xl">P</div>
                <span class="font-bold text-2xl text-msp-blue">Price<span class="text-msp-orange">Mint</span></span>
            </a>
            
            <form id="search-form" class="flex flex-1 max-w-2xl mx-8 relative">
                <input type="text" id="header-search" class="search-input w-full" placeholder="Search for mobile phones, laptops, electronics...">
                <button type="submit" class="search-btn flex items-center justify-center">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </button>
            </form>

            <div class="flex items-center gap-4 text-sm font-medium">
                <a href="deals.html" class="text-msp-orange font-bold">Daily Deals</a>
                <div class="w-px h-6 bg-gray-300"></div>
                <div class="auth-link">
                    <a href="login.html" class="hover:text-msp-blue">Login / Signup</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Category Menu -->
    <div class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-[1280px] mx-auto px-4 flex space-x-2">
            <a href="search.html?category=smartphones" class="nav-link">Mobiles</a>
            <a href="search.html?category=laptops" class="nav-link">Laptops</a>
            <a href="search.html?category=audio" class="nav-link">Audio</a>
            <a href="search.html" class="nav-link">TV & Appliances</a>
        </div>
    </div>

    <div class="bg-white border-b border-gray-200 p-6 mb-6 text-center">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Deal of the Day</h1>
        <p class="text-gray-500">Handpicked price drops and maximum discounts across all stores.</p>
    </div>

    <div class="max-w-[1280px] mx-auto px-4 pb-12">
        <div id="loading" class="py-10 text-center text-gray-500">Loading deals...</div>
        
        <div id="deals-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
            <!-- Deals injected by JS -->
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { updateAuthUI } from './js/auth.js';
        document.addEventListener('DOMContentLoaded', updateAuthUI);
    </script>
    <script>
        const formatPrice = (p) => '₹' + p.toLocaleString('en-IN');
        const grid = document.getElementById('deals-grid');
        const loading = document.getElementById('loading');
        
        document.getElementById('search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const q = document.getElementById('header-search').value.trim();
            if(q) window.location.href = `search.html?q=${encodeURIComponent(q)}`;
        });

        async function loadDeals() {
            try {
                const res = await fetch('/api/deals');
                const deals = await res.json();
                loading.classList.add('hidden');
                grid.classList.remove('hidden');
                
                if (deals.length === 0) {
                    grid.innerHTML = '<div class="col-span-2 text-center py-10 bg-white border border-gray-200">No active deals found today.</div>';
                    return;
                }

                grid.innerHTML = deals.map(p => `
                    <div class="deal-card p-4 flex gap-4 relative cursor-pointer hover:shadow-md transition-shadow" onclick="window.location.href='product.html?id=${p.id}'">
                        <div class="absolute top-0 left-0 bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-br">${p.discount}% Price Drop</div>
                        <div class="w-1/3 shrink-0 flex items-center justify-center p-2 bg-gray-50">
                            <img src="${p.image}" class="max-h-32 object-contain mix-blend-multiply">
                        </div>
                        <div class="w-2/3 flex flex-col justify-center">
                            <h3 class="text-base font-bold text-msp-blue hover:underline mb-2 line-clamp-2">${p.title}</h3>
                            <div class="mb-3">
                                <span class="text-2xl font-bold text-gray-900">${formatPrice(p.lowestPrice)}</span>
                                <span class="text-sm text-gray-400 line-through ml-2">${formatPrice(p.originalPrice)}</span>
                            </div>
                            <div class="flex items-center justify-between mt-auto">
                                <span class="text-xs text-gray-500 font-bold">via ${p.cheapestPlatform}</span>
                                <a href="${p.cheapestUrl}" onclick="event.stopPropagation()" class="btn-orange !py-1.5 !px-4 !text-xs">Grab Deal</a>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                loading.innerHTML = '<span class="text-red-500">Failed to load deals.</span>';
            }
        }

        loadDeals();
    </script>
</body>
</html>
