<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist & Alerts | PriceMint</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A1A1A'/><text x='50' y='68' font-size='60' font-weight='bold' text-anchor='middle' fill='white' font-family='system-ui'>P</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme { --color-charcoal: #111827; --color-savings: #10B981; --font-sans: 'Inter', sans-serif; --font-display: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col text-gray-900">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center gap-2.5 group shrink-0">
                    <div class="w-9 h-9 bg-charcoal rounded-xl flex items-center justify-center group-hover:scale-105 transition-transform">
                        <span class="text-white font-display font-bold text-base">P</span>
                    </div>
                    <span class="font-display font-bold text-xl tracking-tight text-gray-900">Price<span class="text-green-500">Mint</span></span>
                </a>
                <nav class="flex items-center gap-6 ml-auto">
                    <a href="search.html" class="text-sm font-medium text-gray-500 hover:text-gray-900">Explore</a>
                    <button id="logout-btn" class="text-sm font-semibold text-red-600 hover:text-red-700 transition-colors">Sign Out</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto px-4 py-12 w-full">
        <div class="mb-8">
            <h1 class="text-3xl font-display font-bold text-gray-900 mb-2">My Wishlist & Alerts</h1>
            <p class="text-gray-500">Track products and get notified when the price drops below your target.</p>
        </div>

        <div id="loading" class="text-center py-20 text-gray-500">Loading your alerts...</div>

        <div id="wishlist-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
            <!-- Populated by JS -->
        </div>

        <div id="empty-state" class="hidden text-center py-20 bg-white rounded-3xl border border-gray-100 shadow-sm">
            <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">🎯</div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">Your wishlist is empty</h3>
            <p class="text-gray-500 mb-6">Search for products and set a price alert to start saving.</p>
            <a href="search.html" class="bg-charcoal text-white px-6 py-3 rounded-xl font-semibold hover:bg-gray-800 transition-colors inline-block">Explore Products</a>
        </div>
    </main>

    <script type="module">
        import { checkSession, signOut } from './js/auth.js';
        const formatPrice = (p) => '₹' + p.toLocaleString('en-IN');

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await signOut();
            window.location.href = 'index.html';
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const session = await checkSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            const userId = session.user.id;
            
            try {
                const res = await fetch(`http://localhost:3000/api/wishlist/${userId}`);
                const alerts = await res.json();
                
                document.getElementById('loading').classList.add('hidden');
                
                if(alerts.length === 0) {
                    document.getElementById('empty-state').classList.remove('hidden');
                } else {
                    const container = document.getElementById('wishlist-container');
                    container.classList.remove('hidden');
                    container.innerHTML = alerts.map(a => {
                        const p = a.product;
                        const isHit = p.lowestPrice <= a.target_price;
                        return `
                        <div class="bg-white p-6 rounded-2xl border ${isHit ? 'border-green-200 shadow-green-500/10' : 'border-gray-200'} shadow-sm flex flex-col sm:flex-row gap-6 relative">
                            <button onclick="removeAlert('${a.id}')" class="absolute top-4 right-4 text-gray-400 hover:text-red-500" title="Remove Alert">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                            <img src="${p.image}" class="w-24 h-24 object-contain bg-gray-50 rounded-xl p-2 shrink-0">
                            <div class="flex-1">
                                <a href="product.html?id=${p.id}" class="font-bold text-gray-900 leading-tight hover:text-blue-600 line-clamp-2 mb-2">${p.title}</a>
                                <div class="grid grid-cols-2 gap-4 text-sm mb-4">
                                    <div>
                                        <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">Current Price</p>
                                        <p class="font-bold ${isHit ? 'text-green-600' : 'text-gray-900'}">${formatPrice(p.lowestPrice)}</p>
                                    </div>
                                    <div>
                                        <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">Target Price</p>
                                        <p class="font-bold text-gray-900">${formatPrice(a.target_price)}</p>
                                    </div>
                                </div>
                                ${isHit ? 
                                    `<a href="${p.cheapestUrl}" target="_blank" class="w-full block text-center bg-green-500 text-white font-bold py-2 rounded-lg hover:bg-green-600 transition-colors shadow-sm">Target Reached! Buy Now</a>` : 
                                    `<div class="w-full text-center bg-gray-100 text-gray-500 font-semibold py-2 rounded-lg text-sm border border-gray-200">Tracking...</div>`
                                }
                            </div>
                        </div>`;
                    }).join('');
                }
            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerHTML = '<span class="text-red-500">Failed to load alerts.</span>';
            }

            // Global removal function attached to window
            window.removeAlert = async (alertId) => {
                if(!confirm("Remove this price alert?")) return;
                try {
                    await fetch(`http://localhost:3000/api/wishlist/${alertId}`, { method: 'DELETE' });
                    location.reload();
                } catch(e) { alert("Failed to remove"); }
            };
        });
    </script>
</body>
</html>
