<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | PriceMint</title>
    <meta name="description" content="Sign in to PriceMint to save your wishlist and track price drops.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A1A1A'/><text x='50' y='68' font-size='60' font-weight='bold' text-anchor='middle' fill='white' font-family='system-ui'>P</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme { --color-charcoal: #111827; --color-savings: #10B981; --font-sans: 'Inter', sans-serif; --font-display: 'Outfit', sans-serif; }
    </style>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; }
        .font-display { font-family: 'Outfit', sans-serif; }
        .input-field { width: 100%; padding: 1rem 1.25rem; background: rgba(255,255,255,0.9); border: 1px solid #E5E7EB; border-radius: 12px; outline: none; transition: all 0.3s ease; }
        .input-field:focus { border-color: #111827; box-shadow: 0 0 0 4px rgba(17,24,39,0.1); }
        .hero-bg { background: linear-gradient(135deg, #111827 0%, #1F2937 100%); position: relative; overflow: hidden; }
        .hero-bg::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(16,185,129,0.15) 0%, transparent 60%); animation: pulse 10s infinite alternate; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }
        .loader { border: 2px solid rgba(255,255,255,0.2); border-top: 2px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen flex text-gray-900">
    <div class="w-full lg:w-1/2 flex flex-col justify-center px-8 sm:px-16 xl:px-32 relative z-10 bg-[#FAFAFA]">
        <a href="index.html" class="absolute top-8 left-8 flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-charcoal transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg> Back to Home
        </a>
        <div class="max-w-md w-full mx-auto mt-16 lg:mt-0">
            <div class="mb-8 text-center lg:text-left">
                <div class="w-12 h-12 bg-charcoal rounded-2xl flex items-center justify-center mb-6 mx-auto lg:mx-0 shadow-lg">
                    <span class="text-white font-display font-bold text-xl">P</span>
                </div>
                <h1 class="text-3xl font-display font-bold text-charcoal mb-2" id="form-title">Sign In</h1>
                <p class="text-gray-500 text-sm" id="form-subtitle">Enter your details to access your personalized wishlist.</p>
            </div>

            <div id="auth-error" class="hidden mb-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100" role="alert" aria-live="assertive"></div>
            <div id="auth-success" class="hidden mb-4 p-3 bg-green-50 text-green-600 text-sm rounded-lg border border-green-100" role="status" aria-live="polite"></div>

            <form class="space-y-5" id="auth-form" novalidate>
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="hello@example.com" class="input-field" required autocomplete="email" autofocus>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <a href="#" id="forgot-link" class="text-xs font-semibold text-gray-500 hover:text-charcoal hover:underline">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <input type="password" id="password" name="password" placeholder="••••••••" class="input-field pr-12" required minlength="6" autocomplete="current-password">
                        <button type="button" id="toggle-password" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700" aria-label="Show password">
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </button>
                    </div>
                    <p class="text-xs text-gray-400 mt-1.5" id="password-hint">Must be at least 6 characters.</p>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-charcoal text-white font-semibold py-3.5 rounded-xl hover:bg-gray-800 transition-colors shadow-lg shadow-gray-900/20 mt-4 flex justify-center items-center gap-2">
                    <span id="btn-text">Sign In</span>
                </button>
            </form>
            <p class="text-center text-sm text-gray-500 mt-8">
                <span id="toggle-text">Don't have an account?</span>
                <a href="#" id="toggle-mode" class="font-semibold text-charcoal hover:underline">Sign up for free</a>
            </p>
        </div>
    </div>
    <div class="hidden lg:flex lg:w-1/2 hero-bg items-center justify-center p-12">
        <div class="bg-white/10 backdrop-blur-xl p-10 rounded-3xl max-w-lg text-white border border-white/20">
            <h2 class="text-4xl font-display font-bold mb-4">Never overpay again.</h2>
            <p class="text-gray-300 text-lg mb-8">Join smart shoppers who save an average of ₹14,000 every year.</p>
        </div>
    </div>

    <!-- Supabase Auth Logic -->
    <script type="module">
        import { signIn, signUp, checkSession, supabase } from './js/auth.js';

        let isSignUp = false;
        let submitting = false;

        const form = document.getElementById('auth-form');
        const title = document.getElementById('form-title');
        const subtitle = document.getElementById('form-subtitle');
        const btnText = document.getElementById('btn-text');
        const submitBtn = document.getElementById('submit-btn');
        const toggleMode = document.getElementById('toggle-mode');
        const toggleText = document.getElementById('toggle-text');
        const errorDiv = document.getElementById('auth-error');
        const successDiv = document.getElementById('auth-success');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const passwordHint = document.getElementById('password-hint');
        const forgotLink = document.getElementById('forgot-link');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const eyeIcon = document.getElementById('eye-icon');

        // Redirect straight to wishlist if already logged in
        checkSession().then((session) => {
            if (session) window.location.href = 'wishlist.html';
        });

        function showError(message) {
            successDiv.classList.add('hidden');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        function showSuccess(message) {
            errorDiv.classList.add('hidden');
            successDiv.textContent = message;
            successDiv.classList.remove('hidden');
        }

        function clearMessages() {
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
        }

        // Show/hide password
        togglePasswordBtn.addEventListener('click', () => {
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            togglePasswordBtn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
            eyeIcon.style.opacity = isHidden ? '0.6' : '1';
        });

        // Toggle Sign In <-> Sign Up
        toggleMode.addEventListener('click', (e) => {
            e.preventDefault();
            isSignUp = !isSignUp;
            clearMessages();
            if (isSignUp) {
                title.textContent = 'Create an Account';
                subtitle.textContent = 'Join PriceMint and start saving money today.';
                btnText.textContent = 'Sign Up';
                toggleText.textContent = 'Already have an account?';
                toggleMode.textContent = 'Sign In';
                passwordHint.classList.remove('hidden');
                forgotLink.classList.add('invisible');
            } else {
                title.textContent = 'Sign In';
                subtitle.textContent = 'Enter your details to access your wishlist.';
                btnText.textContent = 'Sign In';
                toggleText.textContent = "Don't have an account?";
                toggleMode.textContent = 'Sign up for free';
                forgotLink.classList.remove('invisible');
            }
        });

        // Forgot password flow
        forgotLink.addEventListener('click', async (e) => {
            e.preventDefault();
            clearMessages();
            const email = emailInput.value.trim();
            if (!email) {
                showError('Enter your email address above first, then click "Forgot password?" again.');
                emailInput.focus();
                return;
            }
            forgotLink.textContent = 'Sending...';
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: `${window.location.origin}/reset-password.html`,
            });
            forgotLink.textContent = 'Forgot password?';
            if (error) {
                showError(error.message || 'Could not send reset email. Try again.');
            } else {
                showSuccess('If an account exists for that email, a reset link has been sent.');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (submitting) return; // guard against double-submit

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            clearMessages();

            if (!email || !password) {
                showError('Please fill in both email and password.');
                return;
            }

            submitting = true;
            const originalText = btnText.textContent;
            btnText.innerHTML = '<div class="loader"></div>';
            submitBtn.disabled = true;

            try {
                if (isSignUp) {
                    const { data, error } = await signUp(email, password);
                    if (error) throw error;
                    if (data?.user?.identities?.length === 0) {
                        throw new Error('This email is already registered. Try signing in instead.');
                    }
                    showSuccess('Registration successful! Redirecting...');
                    setTimeout(() => (window.location.href = 'wishlist.html'), 1500);
                } else {
                    const { error } = await signIn(email, password);
                    if (error) throw error;
                    window.location.href = 'wishlist.html';
                }
            } catch (err) {
                showError(err.message || 'Authentication failed. Please try again.');
            } finally {
                submitting = false;
                btnText.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
